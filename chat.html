<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>knock knock - 채팅방</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="chat-container">
        
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <aside class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-header">
                <h3>채팅방 정보</h3>
                <button class="icon-btn" id="closeSidebarBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#495057" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="participant-section">
                    <h4>참여자 2명</h4>
                    <div class="participant-list">
                        <div class="participant-item">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=User2" alt="음악덕후지은" class="avatar-small">
                            <span>음악덕후지은</span>
                        </div>
                        <div class="participant-item">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="나" class="avatar-small">
                            <span>나</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="leave-btn" onclick="location.href='index.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    채팅방 나가기
                </button>
            </div>
        </aside>

        <header class="chat-header">
            <div class="header-left">
                <button class="icon-btn" onclick="location.href='index.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="room-info">
                    <h2>음악덕후지은</h2>
                    <span class="member-count">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        2명
                    </span>
                </div>
            </div>
            <button class="icon-btn" id="openSidebarBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1.5"></circle><circle cx="12" cy="5" r="1.5"></circle><circle cx="12" cy="19" r="1.5"></circle></svg>
            </button>
        </header>

        <main class="chat-main">
            <div class="message-row">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=User2" alt="프로필" class="avatar">
                <div class="message-content">
                    <span class="sender-name">음악덕후지은</span>
                    <div class="message-bubble-wrapper">
                        <div class="message-bubble">안녕하세요! K-POP 이야기 많이 나눠요~</div>
                        <span class="message-time">오전 3:42</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="chat-footer">
            <div class="attach-menu">
                <div class="attach-item"><div class="attach-icon bg-blue"><svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></div><span>사진</span></div>
                <div class="attach-item"><div class="attach-icon bg-green"><svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg></div><span>음성</span></div>
                <div class="attach-item"><div class="attach-icon bg-purple"><svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div><span>일정</span></div>
                <div class="attach-item"><div class="attach-icon bg-yellow"><svg viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg></div><span>이모티콘</span></div>
            </div>
            <div class="input-area">
                <button class="icon-btn close-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#495057" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                <input type="text" placeholder="메시지를 입력하세요...">
                <button class="icon-btn help-btn"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></button>
            </div>
        </footer>
    </div>

    <script>
        const openBtn = document.getElementById('openSidebarBtn');
        const closeBtn = document.getElementById('closeSidebarBtn');
        const sidebar = document.getElementById('chatSidebar');
        const overlay = document.getElementById('sidebarOverlay');

        // 사이드바와 배경에 'active' 클래스를 붙였다 뗐다 하는 함수
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // 버튼이나 어두운 배경을 클릭하면 함수 실행
        openBtn.addEventListener('click', toggleSidebar);
        closeBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
